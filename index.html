      header nav { top: 60px !important; gap: 72px !important; }
      /* The nav has an inline display:flex/position:absolute style that
         ignores its own "hidden md:flex" responsive classes, so the full

        header nav { display: none !important; }

        section[style*="min-height: 600px"] > div[style*="flex: 0 0 50%"] { flex: 1 1 100% !important; width: 100% !important; }
